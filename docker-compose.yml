version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./data:/app/apps/api/data  # Map SQLite db outside
    depends_on:
      - redis
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=super_secret_docker_key_change_me
      # - GITHUB_ID=your_id
      # - GITHUB_SECRET=your_secret
      # - GOOGLE_ID=your_id
      # - GOOGLE_SECRET=your_secret
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis_data: